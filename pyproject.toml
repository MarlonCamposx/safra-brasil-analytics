[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | data
  | notebooks
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["config", "src"]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]
exclude = [".git", "__pycache__", "data/", "notebooks/", ".venv/"]
per-file-ignores = ["__init__.py:F401"]
